<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --lte-sidebar-width: 250px;
            --lte-sidebar-bg: #2d3238; /* Matches dark sidebar in screenshot */
            --lte-sidebar-hover: #3d434a;
            --lte-navbar-bg: #ffffff;
        }
        
        body {
            background-color: #f4f6f9;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        /* Sidebar Structure */
        .lte-sidebar {
            width: var(--lte-sidebar-width);
            background-color: var(--lte-sidebar-bg);
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1030;
            transition: transform 0.3s ease-in-out, margin-left 0.3s ease-in-out;
            border-right: 1px solid #3f474e;
        }

        .lte-brand-link {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0.5rem 1.2rem;
            text-decoration: none;
            color: #fff !important;
            border-bottom: 1px solid #3f474e;
        }

        .sidebar-menu .nav-link {
            color: #c2c7d0;
            border-radius: 0.25rem;
            margin: 0.15rem 0.75rem;
            padding: 0.6rem 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-menu .nav-link:hover, .sidebar-menu .nav-link.active {
            background-color: var(--lte-sidebar-hover);
            color: #fff;
        }

        .menu-open-icon {
            transition: transform 0.2s ease;
        }
        .collapsed .menu-open-icon {
            transform: rotate(-90deg);
        }

        /* Top Navbar Layout */
        .lte-navbar {
            margin-left: var(--lte-sidebar-width);
            height: 56px;
            background-color: var(--lte-navbar-bg);
            border-bottom: 1px solid #dee2e6;
            transition: margin-left 0.3s ease-in-out;
        }

        /* Core Body Container Wrapper */
        .lte-content-wrapper {
            margin-left: var(--lte-sidebar-width);
            padding: 24px;
            min-height: calc(100vh - 56px);
            transition: margin-left 0.3s ease-in-out;
        }

        /* Sidebar Toggle Mechanics */
        body.sidebar-collapse .lte-sidebar {
            transform: translateX(-250px);
        }
        body.sidebar-collapse .lte-navbar,
        body.sidebar-collapse .lte-content-wrapper {
            margin-left: 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% block main_layout %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Interactive Sidebar Drawer Collapse Action
        document.getElementById('sidebarToggle')?.addEventListener('click', function() {
            document.body.classList.toggle('sidebar-collapse');
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
